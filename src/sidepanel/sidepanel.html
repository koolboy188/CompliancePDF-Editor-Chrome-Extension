<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CompliancePDF Controls</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        font-family: Arial, sans-serif;
        background: #f8f9fb;
      }
      .group {
        display: grid;
        gap: 8px;
        margin-bottom: 12px;
      }
      label {
        font-size: 12px;
      }
      select, input, button {
        padding: 6px;
      }
      .row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <div class="group">
      <button data-mode="view">View Mode</button>
      <button data-mode="text">Text Mode</button>
      <button data-mode="object">Object Mode</button>
    </div>

    <div class="group">
      <label for="fontFamily">Font Family</label>
      <select id="fontFamily">
        <option>Arial</option>
        <option>Times New Roman</option>
        <option>Helvetica</option>
        <option>Courier New</option>
      </select>
      <label for="fontSize">Font Size</label>
      <input id="fontSize" type="number" value="14" min="6" max="96" />
      <label for="lineSpacing">Line Spacing</label>
      <input id="lineSpacing" type="number" value="1.4" min="1" max="3" step="0.1" />
      <label for="textAlign">Alignment</label>
      <select id="textAlign">
        <option value="left">Left</option>
        <option value="center">Center</option>
        <option value="right">Right</option>
        <option value="justify">Justify</option>
      </select>
    </div>

    <div class="row">
      <button id="linkBlocks">Link Text Blocks</button>
      <button id="savePdf">Save PDF</button>
    </div>
    <div class="row" style="margin-top:8px;">
      <button id="undoBtn">Undo</button>
      <button id="redoBtn">Redo</button>
    </div>
    <div class="row" style="margin-top:8px;">
      <button id="addRectBtn">Add Rectangle</button>
      <button id="clearSelectBtn">Clear Selection</button>
    </div>
    <div class="row" style="margin-top:8px;">
      <button id="duplicateObjBtn">Duplicate Object</button>
      <button id="deleteObjBtn">Delete Object</button>
    </div>
    <div class="group" style="margin-top:10px;">
      <label for="imageInput">Insert Image</label>
      <input id="imageInput" type="file" accept="image/*" />
      <div class="row">
        <input id="objOpacity" type="number" min="0" max="1" step="0.1" value="1" placeholder="Opacity" />
        <input id="objRotate" type="number" min="-360" max="360" step="1" value="0" placeholder="Rotate" />
      </div>
      <div class="row">
        <input id="objScaleX" type="number" min="0.1" max="10" step="0.1" value="1" placeholder="Scale X" />
        <input id="objScaleY" type="number" min="0.1" max="10" step="0.1" value="1" placeholder="Scale Y" />
      </div>
      <div class="row">
        <input id="objFill" type="text" value="#3b82f6" placeholder="Fill color" />
        <input id="objStroke" type="text" value="#2563eb" placeholder="Stroke color" />
      </div>
      <div class="row">
        <input id="objStrokeWidth" type="number" min="0" max="20" step="0.5" value="1.5" placeholder="Stroke width" />
        <button id="applyObjStyleBtn">Apply Style</button>
      </div>
      <div class="row">
        <button id="flipXBtn">Flip X</button>
        <button id="flipYBtn">Flip Y</button>
      </div>
      <div class="row">
        <button id="bringForwardBtn">Bring Forward</button>
        <button id="sendBackwardBtn">Send Backward</button>
      </div>
      <button id="toggleLockBtn">Toggle Lock</button>
    </div>

    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
